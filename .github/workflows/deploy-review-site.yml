name: Deploy review site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/scientific-evaluation-interface-awe5sw
    paths:
      - "scripts/build_review_site.py"
      - "outputs/alife_2026/**"
      - "paper/paper_alife2026.pdf"
      - "paper/paper_alife2026.tex"
      - "paper/alife2026_lba.pdf"
      - "paper/alife2026_lba.tex"
      - "docs/CLAIM_LEDGER.md"
      - ".github/workflows/deploy-review-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone site
        run: python scripts/build_review_site.py --pages _site

      - name: Push to gh-pages
        run: |
          cd _site
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy review site from ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
