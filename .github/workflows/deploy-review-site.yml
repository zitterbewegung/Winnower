name: Deploy review site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/scientific-evaluation-interface-awe5sw
    paths:
      - "scripts/build_review_site.py"
      - "outputs/alife_2026/**"
      - "paper/paper_alife2026.pdf"
      - "paper/paper_alife2026.tex"
      - "docs/CLAIM_LEDGER.md"
      - ".github/workflows/deploy-review-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone site
        run: python scripts/build_review_site.py --pages _site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
