name = "verify"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["verify"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "Verify"

[[lean_exe]]
name = "verify"
root = "Main"
